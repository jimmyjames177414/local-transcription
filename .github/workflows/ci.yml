name: CI

# Build + test on every push and PR. Runs on Windows because LocalTranscriber.App
# targets net8.0-windows (WPF). Native whisper.cpp / sherpa-onnx inference is not
# exercised here — the test suite isolates it behind fakes — so no models are needed.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore LocalTranscriber.sln

      - name: Build
        run: dotnet build LocalTranscriber.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test LocalTranscriber.sln --configuration Release --no-build --verbosity normal
